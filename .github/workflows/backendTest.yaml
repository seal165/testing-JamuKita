name: Backend Test

on:
  push:
    branches: [king, develop]
  pull_request:
    branches: [king, develop]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    defaults:
       run:
         working-directory: ./backend/
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x, 25.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found — running npm ci"
            npm ci
          else
            echo "package-lock.json not found — running npm install"
            npm install
          fi
        env:
          NODE_ENV: development
      
      - name: Generate Prisma Client for Test Schema
        run: npx prisma generate --schema=./prisma/schema.test.prisma
      
      - name: Setup test environment
        run: |
          echo "DATABASE_URL=file:./test.db" > .env.test
          echo "JWT_SECRET=test_jwt_secret_for_ci" >> .env.test
          echo "PORT=3001" >> .env.test
          echo "NODE_ENV=test" >> .env.test
      
      - name: Push database schema
        run: npx prisma db push --skip-generate --schema=./prisma/schema.test.prisma
        env:
          DATABASE_URL: "file:./test.db"
      
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "file:./test.db"
          JWT_SECRET: test_jwt_secret_for_ci
          NODE_ENV: test
      
      - name: Cleanup test database
        if: always()
        run: rm -f test.db test.db-journal
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            backend/test-results/
            backend/coverage/
